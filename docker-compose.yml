services:
  postgres:
    image: postgres:16-alpine
    container_name: smg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smg
      POSTGRES_USER: smg
      POSTGRES_PASSWORD: smg123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smg -d smg"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smg-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend-smg-system
    container_name: smg-backend
    restart: unless-stopped
    env_file:
      - ./backend-smg-system/.env
    environment:
      NODE_ENV: production
      PORT: 3344
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://smg:smg123@postgres:5432/smg?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${SMG_BACKEND_PORT:-3344}:3344"
    expose:
      - "3344"

  frontend:
    build:
      context: ./frontend-smg
      args:
        VITE_SMG_API_URL: /api
    container_name: smg-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${SMG_FRONTEND_PORT:-8088}:80"

volumes:
  postgres_data:
  redis_data:
